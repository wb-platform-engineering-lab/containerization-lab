# Phase 5 — Build, Scan & Sign
# GitLab CI equivalent of the GitHub Actions scan-sign workflow.
#
# To run this pipeline, copy this file to the root of your repository:
#   cp phase-5-scanning-signing/.gitlab-ci.yml .gitlab-ci.yml
#
# No secrets to configure — GitLab CI provides registry credentials and the
# OIDC token for keyless Cosign signing automatically.

stages:
  - build
  - scan
  - sign

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE/nexio-api
  # Docker-in-Docker TLS configuration
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"

# ── Build ──────────────────────────────────────────────────────────────────────
build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --no-cache jq
    - docker buildx create --use --name ci-builder --driver docker-container
  script:
    - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - TAG_SHA=$IMAGE_NAME:sha-$SHORT_SHA
    - BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    - |
      EXTRA_TAGS=""
      [ "$CI_COMMIT_BRANCH" = "main" ] && EXTRA_TAGS="-t $IMAGE_NAME:latest"
    - |
      docker buildx build \
        --platform linux/amd64 \
        --build-arg APP_VERSION=$CI_COMMIT_SHA \
        --build-arg BUILD_DATE=$BUILD_DATE \
        --cache-from type=registry,ref=$IMAGE_NAME:cache \
        --cache-to   type=registry,ref=$IMAGE_NAME:cache,mode=max \
        --attest type=provenance,mode=max \
        --attest type=sbom \
        --metadata-file /tmp/build-metadata.json \
        --push \
        -t $TAG_SHA $EXTRA_TAGS \
        phase-5-scanning-signing/app/
    - |
      # Capture the pushed image digest for downstream scan and sign jobs
      DIGEST=$(jq -r '."containerimage.digest"' /tmp/build-metadata.json)
      echo "IMAGE_DIGEST=$DIGEST"   > build.env
      echo "IMAGE_TAG_SHA=$TAG_SHA" >> build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Scan ───────────────────────────────────────────────────────────────────────
scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    # Pass registry credentials so Trivy can pull the image for scanning
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
    TRIVY_AUTH_URL: $CI_REGISTRY
  script:
    - |
      trivy image \
        --severity CRITICAL,HIGH \
        --exit-code 1 \
        --format gitlab \
        --output gl-container-scanning-report.json \
        $IMAGE_NAME@$IMAGE_DIGEST
  artifacts:
    # Results appear in GitLab → Security → Vulnerability report
    reports:
      container_scanning: gl-container-scanning-report.json
    when: always   # upload even when the scan step fails
  needs:
    - job: build
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Sign ───────────────────────────────────────────────────────────────────────
sign:
  stage: sign
  image: alpine:3.20
  # id_tokens injects a short-lived OIDC JWT that Cosign exchanges for a
  # Fulcio certificate — no private key required (keyless signing).
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - apk add --no-cache curl
    - |
      curl -sL \
        https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 \
        -o /usr/local/bin/cosign
      chmod +x /usr/local/bin/cosign
    - cosign login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
  script:
    # Sign by digest (immutable). The certificate is bound to this CI job's
    # GitLab OIDC identity: project_path, ref_type, and ref.
    - cosign sign --yes $IMAGE_NAME@$IMAGE_DIGEST
    - |
      cosign verify \
        --certificate-identity-regexp \
          "^project_path:$CI_PROJECT_PATH:ref_type:branch:ref:$CI_COMMIT_REF_NAME$" \
        --certificate-oidc-issuer "https://gitlab.com" \
        $IMAGE_NAME@$IMAGE_DIGEST
  needs:
    - job: build
      artifacts: true
    - job: scan
  # Only sign images on main — not on merge request pipelines
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
