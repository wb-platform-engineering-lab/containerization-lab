# docker-compose.override.yml is loaded automatically alongside docker-compose.yml.
# It adds development-specific settings: source mounts, debug flags, extra tools.
# Never commit real secrets — this file IS committed, it only adds dev conveniences.

services:

  api:
    # Mount source code so changes reflect without rebuilding
    volumes:
      - ./api/app.py:/app/app.py:ro
    environment:
      DEBUG: "true"           # enables Flask debug mode + auto-reload
    # Override the CMD to use Flask's dev server with --reload
    command: ["python", "-m", "flask", "--app", "app", "run",
              "--host", "0.0.0.0", "--port", "5000", "--reload"]

  # Adminer — database UI, only in dev. Accessible at http://localhost:8080
  adminer:
    image: adminer:4-standalone
    container_name: nexio-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - debug    # only starts with: docker compose --profile debug up
