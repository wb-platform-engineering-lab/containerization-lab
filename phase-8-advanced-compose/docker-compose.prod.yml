# Production override — used explicitly: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# Removes dev conveniences: no source mounts, no debug mode, resource limits.

services:

  api:
    # No volume mounts — image is the source of truth
    environment:
      DEBUG: "false"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: always

  worker:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: always

  postgres:
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  redis:
    restart: always
