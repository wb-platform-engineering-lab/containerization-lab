name: Production Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Capstone workflow — integrates every technique from Phases 1–9:
#
#   Phase 1: multi-stage Dockerfile, .dockerignore
#   Phase 3: non-root user, HEALTHCHECK, OCI labels
#   Phase 4: BuildKit cache mounts, --build-arg, multi-platform, GHA cache
#   Phase 5: Trivy CVE scan → SARIF, Cosign keyless signing, SBOM + provenance
#   Phase 6: semver + SHA tagging strategy, GHCR push
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"       # semver releases: v1.0.0, v1.2.3
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nexio-api

jobs:

  # ── Job 1: Build ─────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write          # keyless Cosign signing
      security-events: write   # SARIF upload
      attestations: write      # provenance attestation

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Tagging strategy ──────────────────────────────────────────────────
      # On every push:   nexio-api:sha-a1b2c3d   (immutable — always safe to pin)
      # On push to main: nexio-api:latest         (mutable — dev convenience only)
      # On semver tag:   nexio-api:v1.2.3         (mutable — safe for humans)
      #                  nexio-api:1.2             (floating minor — not recommended)
      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Build (Phase 4: BuildKit + cache + multi-platform + attestations) ─
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: phase-10-capstone/app
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          # Phase 4: GHA remote cache — shared across all runners
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Phase 5: inline SBOM and provenance attestations
          provenance: true
          sbom: true

  # ── Job 2: Scan ──────────────────────────────────────────────────────────
  scan:
    name: CVE Scan
    runs-on: ubuntu-latest
    needs: build
    # Run on push to main and on PRs; skip on tag-only pushes (already scanned on main)
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Vulnerability scan (Phase 5) ─────────────────────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image_ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"       # fail on any CRITICAL or HIGH finding

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()           # upload even if the scan failed
        with:
          sarif_file: trivy-results.sarif

  # ── Job 3: Sign ──────────────────────────────────────────────────────────
  sign:
    name: Sign & Attest
    runs-on: ubuntu-latest
    needs: [build, scan]
    # Only sign images that passed the scan and are on main or a release tag
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      packages: write
      id-token: write          # keyless OIDC signing

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Keyless signing (Phase 5) ─────────────────────────────────────────
      # Signs by digest (immutable), not by tag (mutable).
      # Certificate is issued by Fulcio and bound to this workflow's OIDC identity.
      # Signing event is recorded in Rekor's public transparency log.
      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes ${{ needs.build.outputs.image_ref }}

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp \
              "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer \
              "https://token.actions.githubusercontent.com" \
            ${{ needs.build.outputs.image_ref }}

  # ── Job 4: Summary ───────────────────────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build, scan, sign]
    if: always()

    steps:
      - name: Write job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Build Summary

          | Step | Status |
          |---|---|
          | Build | ${{ needs.build.result }} |
          | CVE Scan | ${{ needs.scan.result }} |
          | Sign | ${{ needs.sign.result }} |

          ### Image
          \`\`\`
          ${{ needs.build.outputs.image_ref }}
          \`\`\`

          ### Tags
          \`\`\`
          ${{ needs.build.outputs.tags }}
          \`\`\`

          ### Verify signature
          \`\`\`bash
          cosign verify \\
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \\
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \\
            ${{ needs.build.outputs.image_ref }}
          \`\`\`
          EOF
