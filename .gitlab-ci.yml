# Production Pipeline — Containerization Lab Capstone
#
# Full workflow:
#
#   1. SCHEDULE (Monday 05:00 UTC)
#      └── renovate job scans Dockerfiles + requirements.txt
#          └── opens an MR for any outdated digest or dependency
#
#   2. MERGE REQUEST (Renovate MR or developer MR)
#      └── build  → pushes :sha-<sha> to registry (no :latest)
#      └── scan   → Trivy scans the built image, uploads SARIF to Security dashboard
#      └── summary → prints image ref + verify command for reviewer
#      (sign is skipped on MRs — only signed images land on main)
#
#   3. PUSH TO MAIN (after MR merged)
#      └── build  → pushes :sha-<sha> + :latest
#      └── scan   → Trivy scan
#      └── sign   → Cosign keyless signature stored in registry
#      └── summary → final image ref + verify command
#
#   4. SEMVER TAG (v*.*.*)
#      └── build  → pushes :sha-<sha> + :vX.Y.Z + :X.Y
#      └── scan + sign + summary
#
# workflow: rules prevent duplicate pipelines — a branch push that already
# has an open MR runs only the MR pipeline, not also a branch pipeline.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

stages:
  - build
  - scan
  - sign
  - summary

# ── Renovate — automated digest bumps ─────────────────────────────────────────
# Runs only on scheduled pipelines. Create a schedule at:
#   CI/CD → Schedules → New schedule → Interval: 0 5 * * 1
renovate:
  stage: .pre
  image: renovate/renovate:38
  variables:
    RENOVATE_PLATFORM:      gitlab
    RENOVATE_ENDPOINT:      https://gitlab.com/api/v4
    RENOVATE_TOKEN:         $RENOVATE_TOKEN
    RENOVATE_AUTODISCOVER:  "false"
    LOG_LEVEL:              info
  script:
    - renovate $CI_PROJECT_PATH
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE/nexio-api
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"

# ── Job 1: Build ──────────────────────────────────────────────────────────────
build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --no-cache jq
    - docker context create tls-env
        --docker "host=${DOCKER_HOST},ca=${DOCKER_TLS_CERTDIR}/client/ca.pem,cert=${DOCKER_TLS_CERTDIR}/client/cert.pem,key=${DOCKER_TLS_CERTDIR}/client/key.pem"
    - docker buildx create --use --name ci-builder --driver docker-container tls-env
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
  script:
    - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - TAG_SHA=$IMAGE_NAME:sha-$SHORT_SHA
    - BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    - |
      TAGS="-t $TAG_SHA"
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="$TAGS -t $IMAGE_NAME:latest"
      fi
      if echo "$CI_COMMIT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
        MINOR=$(echo "$CI_COMMIT_TAG" | sed 's/^v//' | cut -d. -f1-2)
        TAGS="$TAGS -t $IMAGE_NAME:$CI_COMMIT_TAG -t $IMAGE_NAME:$MINOR"
      fi
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg APP_VERSION=$CI_COMMIT_SHA \
        --build-arg BUILD_DATE=$BUILD_DATE \
        --cache-from type=registry,ref=$IMAGE_NAME:cache \
        --cache-to   type=registry,ref=$IMAGE_NAME:cache,mode=max \
        --attest type=provenance,mode=max \
        --attest type=sbom \
        --metadata-file /tmp/build-metadata.json \
        --push \
        $TAGS \
        phase-10-capstone/app/
    - |
      DIGEST=$(jq -r '."containerimage.digest"' /tmp/build-metadata.json)
      echo "IMAGE_DIGEST=$DIGEST"   > build.env
      echo "IMAGE_TAG_SHA=$TAG_SHA" >> build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Job 2: Scan ───────────────────────────────────────────────────────────────
scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
    TRIVY_AUTH_URL: $CI_REGISTRY
  script:
    - |
      trivy image \
        --severity CRITICAL,HIGH \
        --exit-code 1 \
        --ignore-unfixed \
        --format sarif \
        --output trivy-results.sarif \
        $IMAGE_NAME@$IMAGE_DIGEST
  artifacts:
    reports:
      sast: trivy-results.sarif
    when: always
  needs:
    - job: build
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Job 3: Sign ───────────────────────────────────────────────────────────────
sign:
  stage: sign
  image: alpine:3.20
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - apk add --no-cache curl
    - |
      curl -sL \
        https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 \
        -o /usr/local/bin/cosign
      chmod +x /usr/local/bin/cosign
    - cosign login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
  script:
    - cosign sign --yes $IMAGE_NAME@$IMAGE_DIGEST
    - |
      cosign verify \
        --certificate-identity-regexp \
          "^https://gitlab\\.com/$CI_PROJECT_PATH/.*@refs/heads/$CI_COMMIT_REF_NAME$" \
        --certificate-oidc-issuer "https://gitlab.com" \
        $IMAGE_NAME@$IMAGE_DIGEST
  needs:
    - job: build
      artifacts: true
    - job: scan
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Job 4: Summary ────────────────────────────────────────────────────────────
summary:
  stage: summary
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
    - job: scan
      optional: true
    - job: sign
      optional: true
  when: always
  script:
    - |
      echo "========================================"
      echo " Build Summary"
      echo "========================================"
      echo "Image: $IMAGE_NAME@$IMAGE_DIGEST"
      echo "Tag:   $IMAGE_TAG_SHA"
      echo ""
      echo "Verify:"
      echo "  cosign verify \\"
      echo "    --certificate-identity-regexp \"^https://gitlab\\.com/$CI_PROJECT_PATH/.*@refs/heads/$CI_COMMIT_REF_NAME\$\" \\"
      echo "    --certificate-oidc-issuer \"https://gitlab.com\" \\"
      echo "    $IMAGE_NAME@$IMAGE_DIGEST"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
